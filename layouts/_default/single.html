{{ define "main" }}
<div class="page-wrapper">
  {{ partial "sidebar.html" . }}
  <main class="main-content">
    <div class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}<p class="page-desc">{{ . }}</p>{{ end }}
    </div>
    {{ .Content }}
  </main>
</div>
{{ end }}
