<header class="site-header">
  <a href="{{ .Site.BaseURL }}" class="header-brand">
    <img src="/images/logo.png" alt="Aralez logo">
    <span class="brand-name">Aralez</span>
    <!-- <span class="brand-tag">Pingora</span> -->
  </a>

  <nav class="header-nav">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}"{{ if $.IsHome }}{{ if eq .Name "Home" }} class="active"{{ end }}{{ else }}{{ if $.Page.IsMenuCurrent "main" . }} class="active"{{ end }}{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>

  <div class="header-right">
    <a href="{{ .Site.Params.github }}" class="header-github" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>

    <button class="hamburger" id="aralez-hamburger" aria-label="Open navigation menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="drawer-overlay" id="aralez-overlay"></div>

<nav class="mobile-drawer" id="aralez-drawer" aria-label="Mobile navigation">
  <div class="drawer-header">
    <span class="drawer-title">Aralez Docs</span>
    <button class="drawer-close" id="aralez-drawer-close" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
        <path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
      </svg>
    </button>
  </div>

  <div class="drawer-section-title">Documentation</div>

  {{ range .Site.Menus.main }}
  <a href="{{ .URL }}" class="drawer-link{{ if $.IsHome }}{{ if eq .Name "Home" }} active{{ end }}{{ else }}{{ if $.Page.IsMenuCurrent "main" . }} active{{ end }}{{ end }}">
    {{ .Name }}
  </a>
  {{ end }}

  <div class="drawer-footer">
    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener" class="drawer-github">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      View on GitHub
    </a>
  </div>
</nav>

<script>
(function () {
  var ham     = document.getElementById('aralez-hamburger');
  var drawer  = document.getElementById('aralez-drawer');
  var overlay = document.getElementById('aralez-overlay');
  var closeBtn= document.getElementById('aralez-drawer-close');

  function openDrawer() {
    drawer.classList.add('open');
    overlay.classList.add('open');
    ham.classList.add('open');
    ham.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    ham.classList.remove('open');
    ham.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  ham.addEventListener('click', function () {
    drawer.classList.contains('open') ? closeDrawer() : openDrawer();
  });
  closeBtn.addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);

  drawer.querySelectorAll('.drawer-link').forEach(function (a) {
    a.addEventListener('click', closeDrawer);
  });
})();
</script>
